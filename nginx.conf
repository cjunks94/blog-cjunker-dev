# Resolve real client IP from Railway's proxy. Trust private/CGNAT
# ranges only — extend with Cloudflare's published ranges if you put
# CF in front and want the leftmost (origin) IP in logs.
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
set_real_ip_from 100.64.0.0/10;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Silence error.log spam from bot scanners probing for files we don't have.
    # Access log still records the request.
    log_not_found off;

    # Clean URLs
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # RSS feed — allow CORS from portfolio
    location = /rss.xml {
        add_header Access-Control-Allow-Origin "https://cjunker.dev";
        add_header Content-Type "application/rss+xml";
    }

    # Custom 404
    error_page 404 /404.html;
}
